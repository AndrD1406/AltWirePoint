name: Build and Deploy to Azure Web App

on:
  push:
    branches:
      - master

env:
  AZURE_WEBAPP_NAME: 'AltWirePoint' # Replace this with your actual Azure App Service name
  DOTNET_VERSION: '10.0.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore AltWirePoint.sln

      - name: Build with Release configuration
        run: dotnet build AltWirePoint.sln --configuration Release --no-restore

      - name: Publish Web API Project
        run: dotnet publish AltWirePoint.WebApi/AltWirePoint.WebApi.csproj --configuration Release --output ${{ runner.temp }}/publish --no-build

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ runner.temp }}/publish
